name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Execute remote SSH commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PA_HOST }}
        username: cggamesservers
        key: ${{ secrets.PA_PRIVATE_KEY }}
        script: |
          cd /home/cggamesservers/mysite
          git fetch https://github.com/ishaang123/chatbot.git main
          git reset --hard FETCH_HEAD
          touch /var/www/cggamesservers_pythonanywhere_com_wsgi.py
